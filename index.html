<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todos | app</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <div class="date-box">
          <div class="date">
            <p id="kun">DD</p>
            <p id="oy">MM</p>
            <p id="yil">YY</p>
          </div>
          <p class="time">
            <span id="soat">hh</span>:<span id="minut">mm</span>:<span
              id="sekund"
              >ss</span
            >
          </p>
        </div>
        <div class="tasks">
          <h1>Tasks</h1>

          <div class="input-box">
            <p id="error-message"></p>
          </div>
          <form id="form">
            <input name="task" type="text" placeholder="type..." />
            <button style="border: none; background-color: transparent">
              <img id="add-button" src="./add.svg" width="45" alt="add" />
            </button>
          </form>
          <ul class="tasks-list"></ul>
        </div>
        <div class="modal hidden">
          <div class="modal-header">
            <p>change task</p>
            <img
              style="cursor: pointer"
              id="close-modal"
              src="./close-modal.svg"
              width="32"
              alt="cancel"
            />
          </div>
          <p id="error-message-edit"></p>
          <form id="change-form">
            <input
              name="change-input"
              type="text"
              placeholder="change type..."
            />
            <button id="cahnge-task">Change</button>
          </form>
        </div>
      </div>
    </div>

    <div class="overlay hidden"></div>

    <script src="./app.js"></script>
  </body>
</html>
